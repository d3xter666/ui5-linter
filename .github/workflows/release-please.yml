name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional explicit version (e.g. 1.2.4). If omitted, next patch is computed from .release-please-manifest.json"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  pull-request:
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{steps.release.outputs.releases_created}}
      paths_released: ${{steps.release.outputs.paths_released}}
    steps:
    - uses: actions/github-script@v7
      id: manual_release_version
      if: ${{github.event_name == 'workflow_dispatch'}}
      with:
        script: |
          const inputReleaseAs = context.payload.inputs?.release_as?.trim();
          if (inputReleaseAs) {
            core.setOutput("release_as", inputReleaseAs);
            core.info(`Using manually provided release-as version: ${inputReleaseAs}`);
            return;
          }

          const {data} = await github.rest.repos.getContent({
            owner: context.repo.owner,
            repo: context.repo.repo,
            path: ".release-please-manifest.json",
            ref: "main"
          });
          const content = Buffer.from(data.content, "base64").toString("utf8");
          const manifest = JSON.parse(content);
          const currentVersion = manifest["."];
          const [major, minor, patch] = currentVersion.split(".").map(Number);
          const nextPatch = `${major}.${minor}.${patch + 1}`;

          core.setOutput("release_as", nextPatch);
          core.info(`Computed next patch release-as version: ${nextPatch}`);
    - uses: googleapis/release-please-action@v4
      id: release
      with:
        token: ${{ secrets.GH_OPENUI5BOT || github.token }}
        target-branch: main
        release-as: ${{steps.manual_release_version.outputs.release_as}}
  publish-package:
    needs: pull-request
    if: ${{needs.pull-request.outputs.releases_created && toJson(fromJson(needs.pull-request.outputs.paths_released)) != '[]'}}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for trusted publishing via OIDC (https://docs.npmjs.com/trusted-publishers)
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node.js LTS
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install dependencies
      run: npm ci
    - name: Run build
      run: npm run build
    - name: Remove devDependencies from package.json
      run: |
        mv package.json package.json.bak
        node <<- EOM
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json.bak", {encoding: "utf8"}));
          pkg.devDependencies = {};
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, "\t"), {encoding: "utf8"});
        EOM
    - name: Pruning extraneous packages (also updates shrinkwrap)
      run: npm prune --omit=dev
    - name: Restoring original package.json
      run: |
        rm package.json
        mv package.json.bak package.json
    # - name: Publish to npm
    #   run: npm publish --access public
