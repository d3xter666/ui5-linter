name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional explicit version (e.g. 1.21.1). If omitted, next patch is computed from .release-please-manifest.json"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  manual-trigger-pr:
    if: ${{github.event_name == 'workflow_dispatch'}}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const inputReleaseAs = context.payload.inputs?.release_as?.trim();
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const baseRef = "main";
          const branchName = `release-please/manual-trigger-${context.runId}`;

          let releaseAs = inputReleaseAs;
          if (!releaseAs) {
            const {data} = await github.rest.repos.getContent({
              owner,
              repo,
              path: ".release-please-manifest.json",
              ref: baseRef
            });
            const content = Buffer.from(data.content, "base64").toString("utf8");
            const manifest = JSON.parse(content);
            const [major, minor, patch] = manifest["."].split(".").map(Number);
            releaseAs = `${major}.${minor}.${patch + 1}`;
            core.info(`Computed next patch release-as version: ${releaseAs}`);
          } else {
            core.info(`Using manually provided release-as version: ${releaseAs}`);
          }

          const base = await github.rest.git.getRef({
            owner,
            repo,
            ref: `heads/${baseRef}`
          });
          const baseSha = base.data.object.sha;

          await github.rest.git.createRef({
            owner,
            repo,
            ref: `refs/heads/${branchName}`,
            sha: baseSha
          });

          const baseCommit = await github.rest.git.getCommit({
            owner,
            repo,
            commit_sha: baseSha
          });

          const commitMessage = [
            "deps: trigger manual patch release",
            "",
            `Release-As: ${releaseAs}`,
            "",
            "Trigger release-please patch release from workflow_dispatch"
          ].join("\n");

          const commit = await github.rest.git.createCommit({
            owner,
            repo,
            message: commitMessage,
            tree: baseCommit.data.tree.sha,
            parents: [baseSha]
          });

          await github.rest.git.updateRef({
            owner,
            repo,
            ref: `heads/${branchName}`,
            sha: commit.data.sha,
            force: true
          });

          const pr = await github.rest.pulls.create({
            owner,
            repo,
            head: branchName,
            base: baseRef,
            title: `deps: trigger patch release ${releaseAs}`,
            body: [
              "This PR was created automatically by the release-please workflow_dispatch run.",
              "",
              `- Release-As: ${releaseAs}`,
              "- Commit type: deps (releasable)",
              "",
              "After merging this PR, the push-to-main release-please workflow will open/update the release PR."
            ].join("\n")
          });

          core.notice(`Created trigger PR: ${pr.data.html_url}`);
          core.notice(`Release-As: ${releaseAs}`);

  pull-request:
    if: ${{github.event_name == 'push'}}
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{steps.release.outputs.releases_created}}
      paths_released: ${{steps.release.outputs.paths_released}}
    steps:
    - uses: googleapis/release-please-action@v4
      id: release
      with:
        token: ${{ secrets.GH_OPENUI5BOT || github.token }}
        target-branch: main
  publish-package:
    needs: pull-request
    if: ${{needs.pull-request.outputs.releases_created && toJson(fromJson(needs.pull-request.outputs.paths_released)) != '[]'}}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for trusted publishing via OIDC (https://docs.npmjs.com/trusted-publishers)
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node.js LTS
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install dependencies
      run: npm ci
    - name: Run build
      run: npm run build
    - name: Remove devDependencies from package.json
      run: |
        mv package.json package.json.bak
        node <<- EOM
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json.bak", {encoding: "utf8"}));
          pkg.devDependencies = {};
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, "\t"), {encoding: "utf8"});
        EOM
    - name: Pruning extraneous packages (also updates shrinkwrap)
      run: npm prune --omit=dev
    - name: Restoring original package.json
      run: |
        rm package.json
        mv package.json.bak package.json
    # - name: Publish to npm
    #   run: npm publish --access public
